<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rechner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', 'Helvetica', sans-serif;
            background: linear-gradient(135deg, #1a1f3a 0%, #2d3561 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .calculator {
            background: linear-gradient(135deg, #2d3561 0%, #3a4080 100%);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            padding: 30px;
            width: 100%;
            max-width: 360px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .formula {
            background: #0f1419;
            padding: 12px 20px;
            margin-bottom: 12px;
            text-align: right;
            font-size: 14px;
            color: #8892b0;
            min-height: 24px;
            border-radius: 20px;
            font-family: 'Courier New', monospace;
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.4);
        }

        .display {
            background: #0f1419;
            padding: 30px 20px;
            margin-bottom: 30px;
            text-align: right;
            font-size: 56px;
            font-weight: 300;
            color: #ffffff;
            word-wrap: break-word;
            word-break: break-all;
            min-height: 90px;
            border-radius: 25px;
            font-family: 'Courier New', monospace;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            padding: 22px;
            border: none;
            border-radius: 18px;
            font-size: 22px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s ease;
            background: #4f5a8f;
            color: white;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        button:hover {
            background: #5a6699;
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        button:active {
            transform: translateY(0px);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .num-btn {
            background: #4f5a8f;
        }

        .num-btn:hover {
            background: #5a6699;
        }

        .op-btn {
            background: linear-gradient(135deg, #5a6fcc 0%, #4f5aac 100%);
            box-shadow: 0 8px 20px rgba(90, 111, 204, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .op-btn:hover {
            background: linear-gradient(135deg, #6a7fdc 0%, #5f6abc 100%);
            box-shadow: 0 10px 28px rgba(90, 111, 204, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .equals-btn {
            background: linear-gradient(135deg, #6a7fdc 0%, #5f6abc 100%);
            color: white;
            grid-column: span 1;
            grid-row: span 2;
            box-shadow: 0 8px 20px rgba(90, 111, 204, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .equals-btn:hover {
            background: linear-gradient(135deg, #7a8fec 0%, #6f7acc 100%);
            box-shadow: 0 10px 28px rgba(90, 111, 204, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .clear-btn {
            background: linear-gradient(135deg, #5a6fcc 0%, #4f5aac 100%);
            color: white;
            grid-column: span 1;
            box-shadow: 0 8px 20px rgba(90, 111, 204, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .clear-btn:hover {
            background: linear-gradient(135deg, #6a7fdc 0%, #5f6abc 100%);
            box-shadow: 0 10px 28px rgba(90, 111, 204, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .func-btn {
            background: linear-gradient(135deg, #5a6fcc 0%, #4f5aac 100%);
            color: white;
            box-shadow: 0 8px 20px rgba(90, 111, 204, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .func-btn:hover {
            background: linear-gradient(135deg, #6a7fdc 0%, #5f6abc 100%);
            box-shadow: 0 10px 28px rgba(90, 111, 204, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .error-msg {
            color: #ff6b6b;
            text-align: center;
            margin-top: 15px;
            min-height: 20px;
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="formula" id="formula"></div>
        <div class="display" id="display">0</div>
        
        <div class="buttons">
            <!-- Row 1: Clear and advanced functions -->
            <button class="clear-btn" onclick="clearDisplay()">C</button>
            <button class="func-btn" onclick="toggleSign()">+/−</button>
            <button class="op-btn" onclick="appendOperator('/')">÷</button>
            <button class="op-btn" onclick="appendOperator('*')">×</button>
            
            <!-- Row 2: Numbers and basic ops -->
            <button class="num-btn" onclick="appendNumber('7')">7</button>
            <button class="num-btn" onclick="appendNumber('8')">8</button>
            <button class="num-btn" onclick="appendNumber('9')">9</button>
            <button class="op-btn" onclick="appendOperator('-')">−</button>
            
            <!-- Row 3 -->
            <button class="num-btn" onclick="appendNumber('4')">4</button>
            <button class="num-btn" onclick="appendNumber('5')">5</button>
            <button class="num-btn" onclick="appendNumber('6')">6</button>
            <button class="op-btn" onclick="appendOperator('+')">+</button>
            
            <!-- Row 4 -->
            <button class="num-btn" onclick="appendNumber('1')">1</button>
            <button class="num-btn" onclick="appendNumber('2')">2</button>
            <button class="num-btn" onclick="appendNumber('3')">3</button>
            <button class="equals-btn" onclick="calculate()">=</button>
            
            <!-- Row 5: 0, decimal, advanced functions -->
            <button class="num-btn" style="grid-column: span 2;" onclick="appendNumber('0')">0</button>
            <button class="num-btn" onclick="appendNumber('.')">.</button>
            
            <!-- Row 6: Advanced functions -->
            <button class="func-btn" onclick="squareRoot()">√</button>
            <button class="func-btn" onclick="square()">x²</button>
            <button class="func-btn" onclick="reciprocal()">1/x</button>
            <button class="func-btn" onclick="backspace()">⌫</button>
        </div>

        <div class="error-msg" id="errorMsg"></div>
    </div>

    <script>
        let display = document.getElementById('display');
        let formula = document.getElementById('formula');
        let currentValue = '0';
        let firstNumber = null;
        let operation = null;
        let shouldResetDisplay = false;

        function updateDisplay() {
            display.textContent = currentValue;
            document.getElementById('errorMsg').textContent = '';
        }

        function updateFormula() {
            if (firstNumber !== null && operation !== null) {
                formula.textContent = `${firstNumber} ${operation}`;
            } else {
                formula.textContent = '';
            }
        }

        function appendNumber(num) {
            if (shouldResetDisplay) {
                currentValue = num;
                shouldResetDisplay = false;
            } else {
                if (currentValue === '0' && num !== '.') {
                    currentValue = num;
                } else if (num === '.' && currentValue.includes('.')) {
                    return;
                } else {
                    currentValue += num;
                }
            }
            updateDisplay();
        }

        function appendOperator(op) {
            const num = parseFloat(currentValue);
            if (isNaN(num)) {
                document.getElementById('errorMsg').textContent = 'Ungültige Nummer';
                return;
            }

            if (firstNumber !== null && operation !== null && !shouldResetDisplay) {
                calculate();
            } else {
                firstNumber = num;
            }
            operation = op;
            shouldResetDisplay = true;
            updateFormula();
        }

        function clearDisplay() {
            currentValue = '0';
            firstNumber = null;
            operation = null;
            shouldResetDisplay = false;
            updateDisplay();
            updateFormula();
        }

        function backspace() {
            if (currentValue.length > 1) {
                currentValue = currentValue.slice(0, -1);
            } else {
                currentValue = '0';
            }
            updateDisplay();
        }

        function toggleSign() {
            const num = parseFloat(currentValue);
            if (!isNaN(num)) {
                currentValue = String(num * -1);
                updateDisplay();
            }
        }

        function squareRoot() {
            const num = parseFloat(currentValue);
            if (isNaN(num) || num < 0) {
                document.getElementById('errorMsg').textContent = 'Ungültige Operation';
                return;
            }
            currentValue = String(Math.sqrt(num));
            shouldResetDisplay = true;
            updateDisplay();
        }

        function square() {
            const num = parseFloat(currentValue);
            if (isNaN(num)) {
                document.getElementById('errorMsg').textContent = 'Ungültige Operation';
                return;
            }
            currentValue = String(num * num);
            shouldResetDisplay = true;
            updateDisplay();
        }

        function reciprocal() {
            const num = parseFloat(currentValue);
            if (isNaN(num) || num === 0) {
                document.getElementById('errorMsg').textContent = 'Division durch Null';
                return;
            }
            currentValue = String(1 / num);
            shouldResetDisplay = true;
            updateDisplay();
        }

        async function calculate() {
            const secondNumber = parseFloat(currentValue);
            
            if (firstNumber === null || operation === null || isNaN(secondNumber)) {
                document.getElementById('errorMsg').textContent = 'Ungültige Operation';
                return;
            }

            try {
                const response = await fetch('/api/calc', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        a: firstNumber,
                        b: secondNumber,
                        operation: operation
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    document.getElementById('errorMsg').textContent = `Fehler: ${data.detail}`;
                    return;
                }

                currentValue = String(data.result);
                firstNumber = null;
                operation = null;
                shouldResetDisplay = true;
                updateDisplay();
                updateFormula();
            } catch (error) {
                document.getElementById('errorMsg').textContent = `Fehler: ${error.message}`;
            }
        }

        // Allow keyboard input
        document.addEventListener('keydown', (e) => {
            if (e.key >= '0' && e.key <= '9') appendNumber(e.key);
            if (e.key === '.') appendNumber('.');
            if (e.key === '+') appendOperator('+');
            if (e.key === '-') appendOperator('-');
            if (e.key === '*') appendOperator('*');
            if (e.key === '/') { e.preventDefault(); appendOperator('/'); }
            if (e.key === 'Enter' || e.key === '=') { e.preventDefault(); calculate(); }
            if (e.key === 'Backspace') { e.preventDefault(); backspace(); }
            if (e.key === 'Escape') clearDisplay();
        });

        updateDisplay();
    </script>
</body>
</html>
